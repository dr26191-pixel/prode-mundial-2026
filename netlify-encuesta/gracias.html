<!DOCTYPE html><!-- v2 -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! – GiPA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange:      #F59B23;
      --orange-dark: #D4820E;
      --gray-900:    #3A3A3A;
      --gray-500:    #8A8A8A;
      --gray-100:    #F5F5F5;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.10);
      max-width: 440px;
      width: 100%;
      overflow: hidden;
      text-align: center;
    }
    .top-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--orange-dark), var(--orange));
    }
    .body { padding: 40px 32px 36px; }
    .logo-wrap {
      display: inline-block;
      background: var(--gray-100);
      border-radius: 50%;
      padding: 14px;
      margin-bottom: 20px;
    }
    .logo-wrap img { width: 70px; height: 70px; object-fit: contain; display: block; }
    .check {
      font-size: 3.2rem;
      margin-bottom: 14px;
      display: block;
    }
    h1 {
      font-size: 1.45rem;
      color: var(--gray-900);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    h1 span { color: var(--orange); }
    p { color: var(--gray-500); line-height: 1.6; font-size: 0.95rem; }
    .team {
      margin-top: 28px;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--orange-dark);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="body">
      <div class="logo-wrap">
        <img src="Logo_gipa.png" alt="Logo GiPA">
      </div>
      <span class="check">✅</span>
      <h1>¡Muchas gracias por<br>su <span>colaboración</span>!</h1>
      <p>Sus respuestas han sido registradas correctamente.<br>
         Su opinión es muy valiosa para seguir mejorando nuestras plenarias.</p>
      <p class="team">El equipo GiPA</p>
    </div>
  </div>
</body>
</html>
