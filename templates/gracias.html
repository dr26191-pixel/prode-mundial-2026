<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! – GiPA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 48px 40px;
    }
    .check { font-size: 4rem; }
    h1 { font-size: 1.6rem; color: #1a3c6e; margin: 16px 0 10px; }
    p  { color: #4a5568; line-height: 1.6; }
    .team { margin-top: 32px; font-weight: 700; color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>¡Muchas gracias por su colaboración!</h1>
    <p>Sus respuestas han sido registradas correctamente.<br>
       Su opinión es muy valiosa para seguir mejorando nuestras plenarias.</p>
    <p class="team">El equipo GiPA</p>
  </div>
</body>
</html>
