<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Prode Mundial 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif;
           background: linear-gradient(135deg,#1a5c2e,#0e3a1c);
           min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:16px; padding:36px 32px; width:100%; max-width:360px;
            box-shadow:0 8px 32px rgba(0,0,0,.3); margin:20px; }
    .card h1 { font-size:1.3rem; font-weight:900; color:#1a5c2e; text-align:center; margin-bottom:4px; }
    .card p  { font-size:.85rem; color:#5a5a5a; text-align:center; margin-bottom:24px; }
    .flash { background:#fef3cd; border:1px solid #f0c040; border-radius:8px;
             padding:9px 14px; margin-bottom:16px; font-size:.85rem; color:#7d5a00; }
    label { display:block; font-weight:700; font-size:.88rem; margin-bottom:6px; }
    input[type=password] { width:100%; padding:11px 14px; border:1.5px solid #d0d0d0;
      border-radius:8px; font-size:16px; font-family:inherit; }
    input[type=password]:focus { outline:none; border-color:#27ae60; box-shadow:0 0 0 3px rgba(39,174,96,.15); }
    button { margin-top:18px; width:100%; padding:13px;
             background:linear-gradient(135deg,#1a5c2e,#27ae60);
             color:#fff; font-size:1rem; font-weight:700; border:none; border-radius:8px; cursor:pointer; }
    .back { display:block; text-align:center; margin-top:16px; font-size:.83rem;
            color:#5a5a5a; text-decoration:none; }
    .back:hover { color:#1a5c2e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚙️ Panel Admin</h1>
    <p>Prode Mundial 2026</p>
    {% with msgs = get_flashed_messages() %}
      {% if msgs %}<div class="flash">{{ msgs[0] }}</div>{% endif %}
    {% endwith %}
    <form method="POST" action="/admin">
      <label for="pw">Contraseña</label>
      <input type="password" id="pw" name="password" autofocus autocomplete="current-password">
      <button type="submit">Ingresar →</button>
    </form>
    <a class="back" href="/">← Volver al inicio</a>
  </div>
</body>
</html>
